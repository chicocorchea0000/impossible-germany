<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Simulador de murmuración: visualización interactiva del comportamiento colectivo de estorninos basado en algoritmos de flocking.">
<title>Murmuración - Simulador de Flocking</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;}
body{background:#fff;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
canvas{display:block;background:#fff;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let cfg = {
  pop:1700, spd:4.7, rad:160,
  sepW:0.5, cohW:0.5, aliW:5,
  wind:0.034, sz:1.5, force:0.12
};

function angleDiff(a, b){
  let d = b - a;
  while(d >  Math.PI) d -= Math.PI*2;
  while(d < -Math.PI) d += Math.PI*2;
  return d;
}

class Boid {
  constructor(){
    this.x      = Math.random() * W;
    this.y      = Math.random() * H;
    this.angle  = Math.random() * Math.PI * 2;
    this.speed  = cfg.spd * (0.75 + Math.random() * 0.5);
    this.vx     = Math.cos(this.angle) * this.speed;
    this.vy     = Math.sin(this.angle) * this.speed;
    this.smoothFx = 0;
    this.smoothFy = 0;
    this.angVel = 0;
    this.mass   = 0.85 + Math.random() * 0.3;
    this.phase  = Math.random() * Math.PI * 2;
  }

  flock(grid){
    const r     = cfg.rad;
    const r2    = r * r;
    const sepR  = r * 0.32;
    const sepR2 = sepR * sepR;
    let alx=0,aly=0, cox=0,coy=0, spx=0,spy=0;
    let an=0, cn=0, sn=0;
    const cx = Math.floor(this.x / r);
    const cy = Math.floor(this.y / r);

    for(let dx=-1; dx<=1; dx++) for(let dy=-1; dy<=1; dy++){
      const cell = grid.get(`${cx+dx},${cy+dy}`);
      if(!cell) continue;
      for(const b of cell){
        if(b===this) continue;
        const ddx = b.x - this.x, ddy = b.y - this.y;
        const d2  = ddx*ddx + ddy*ddy;
        if(d2 > r2 || d2 === 0) continue;
        const w = 1 - Math.sqrt(d2)/r;
        alx += b.vx*w; aly += b.vy*w; an += w;
        cox += b.x*w;  coy += b.y*w;  cn += w;
        if(d2 < sepR2){
          const d = Math.sqrt(d2) || 0.001;
          const sw = (1 - d/sepR) * (1 - d/sepR);
          spx -= (ddx/d)*sw; spy -= (ddy/d)*sw; sn++;
        }
      }
    }

    const spd = cfg.spd;
    let fx = 0, fy = 0;

    if(an > 0){
      const m = Math.sqrt(alx*alx + aly*aly) || 1;
      fx += (alx/m*spd - this.vx) * cfg.aliW;
      fy += (aly/m*spd - this.vy) * cfg.aliW;
    }
    if(cn > 0){
      let dx = cox/cn - this.x, dy = coy/cn - this.y;
      const d = Math.sqrt(dx*dx+dy*dy) || 1;
      fx += (dx/d*spd - this.vx) * cfg.cohW;
      fy += (dy/d*spd - this.vy) * cfg.cohW;
    }
    if(sn > 0){
      const m = Math.sqrt(spx*spx+spy*spy) || 1;
      fx += (spx/m*spd - this.vx) * cfg.sepW;
      fy += (spy/m*spd - this.vy) * cfg.sepW;
    }

    const ease = 0.055 / this.mass;
    this.smoothFx += (fx - this.smoothFx) * ease;
    this.smoothFy += (fy - this.smoothFy) * ease;
  }

  update(windX, windY){
    const spd = cfg.spd;

    const totalFx = this.smoothFx + windX * 8;
    const totalFy = this.smoothFy + windY * 8;
    const fMag = Math.sqrt(totalFx*totalFx + totalFy*totalFy);

    if(fMag > 0.001){
      const desiredAngle = Math.atan2(totalFy, totalFx);
      const diff = angleDiff(this.angle, desiredAngle);
      const maxTurn = 0.038;
      const torque  = Math.max(-maxTurn, Math.min(maxTurn, diff * 0.18));
      this.angVel  += torque;
      this.angVel  *= 0.72;
      this.angVel   = Math.max(-maxTurn, Math.min(maxTurn, this.angVel));
      this.angle   += this.angVel;
    }

    const targetSpd = spd * (0.82 + 0.18 * Math.sin(this.phase));
    this.speed += (targetSpd - this.speed) * 0.04;
    this.phase += 0.018;

    this.vx = Math.cos(this.angle) * this.speed;
    this.vy = Math.sin(this.angle) * this.speed;
    this.x += this.vx;
    this.y += this.vy;

    const margin = 90;
    let borderFx = 0, borderFy = 0;
    if(this.x < margin){
      const t = 1 - this.x/margin;
      borderFx = 0.6*t*t;
    } else if(this.x > W-margin){
      const t = 1 - (W-this.x)/margin;
      borderFx = -0.6*t*t;
    }
    if(this.y < margin){
      const t = 1 - this.y/margin;
      borderFy = 0.6*t*t;
    } else if(this.y > H-margin){
      const t = 1 - (H-this.y)/margin;
      borderFy = -0.6*t*t;
    }
    if(borderFx !== 0 || borderFy !== 0){
      const bAngle = Math.atan2(borderFy, borderFx);
      const bDiff  = angleDiff(this.angle, bAngle);
      this.angVel += Math.max(-0.06, Math.min(0.06, bDiff * 0.25));
    }

    this.x = Math.max(-5, Math.min(W+5, this.x));
    this.y = Math.max(-5, Math.min(H+5, this.y));
  }

  draw(ctx){
    ctx.beginPath();
    ctx.arc(this.x, this.y, 1, 0, Math.PI * 2);
    ctx.fill();
  }
}

let flock = [];
function respawn(){
  const n = cfg.pop;
  while(flock.length < n) flock.push(new Boid());
  while(flock.length > n) flock.pop();
}
respawn();

function buildGrid(){
  const r = cfg.rad;
  const map = new Map();
  for(const b of flock){
    const k = `${Math.floor(b.x/r)},${Math.floor(b.y/r)}`;
    if(!map.has(k)) map.set(k,[]);
    map.get(k).push(b);
  }
  return map;
}

let windAngle = Math.random() * Math.PI * 2;
let perturb = null;

canvas.addEventListener('click', e=>{
  perturb = {x: e.clientX, y: e.clientY};
});

function loop(){
  requestAnimationFrame(loop);

  windAngle += (Math.random()-0.5) * 0.035;
  const wm = cfg.wind;
  const windX = Math.cos(windAngle) * wm;
  const windY = Math.sin(windAngle) * wm;

  const grid = buildGrid();

  if(perturb){
    const {x:px, y:py} = perturb;
    for(const b of flock){
      const dx=b.x-px, dy=b.y-py;
      const d2=dx*dx+dy*dy;
      if(d2 < 220*220 && d2 > 0){
        const d = Math.sqrt(d2);
        const f = (1 - d/220) * 0.9;
        b.vx += dx/d * f * cfg.spd;
        b.vy += dy/d * f * cfg.spd;
      }
    }
    perturb = null;
  }

  for(const b of flock){
    b.flock(grid);
    b.update(windX, windY);
  }

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  for(const b of flock) b.draw(ctx);
}
loop();
</script>
</body>
</html>
